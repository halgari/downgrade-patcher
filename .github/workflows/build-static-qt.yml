name: Build Static Qt Cache

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      cache-hit:
        value: ${{ jobs.build.outputs.cache-hit }}

jobs:
  build:
    runs-on: windows-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Cache static Qt
        id: cache
        uses: actions/cache@v4
        with:
          path: C:\Qt6Static
          key: qt6-static-6.8.3-msvc-x64-v1

      - name: Install build tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          choco install ninja cmake --no-progress -y

      - name: Download Qt source
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          aqt install-src windows 6.8.3 --outputdir C:\QtSrc

      - name: Build static Qt
        if: steps.cache.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd /d C:\QtSrc\6.8.3\Src
          cmake -G Ninja -B build -DCMAKE_INSTALL_PREFIX=C:\Qt6Static -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DINPUT_static_runtime=ON -DQT_BUILD_EXAMPLES=OFF -DQT_BUILD_TESTS=OFF -DINPUT_gui=ON -DINPUT_widgets=ON -DINPUT_network=ON -DINPUT_concurrent=ON -DINPUT_dbus=OFF -DINPUT_opengl=OFF -DINPUT_openssl=OFF -DINPUT_sql=OFF -DINPUT_testlib=ON -DINPUT_printsupport=OFF -DINPUT_multimedia=OFF -DINPUT_quick=OFF -DINPUT_qml=OFF
          cmake --build build --parallel
          cmake --install build
