name: Client Build & Release

on:
  push:
    branches: [master, main]
    paths:
      - 'client/**'
      - '.github/workflows/client-build.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'client/**'

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld \
            qt6-base-dev qt6-base-dev-tools libqt6network6 \
            libzstd-dev libxxhash-dev

      - name: Install xmake
        run: |
          curl -fsSL https://xmake.io/shget.text | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure (release + LTO + static)
        working-directory: client
        run: |
          xmake f -m release \
            --toolchain=clang \
            --qt=/usr/lib/qt6 \
            -y

      - name: Build
        working-directory: client
        run: xmake -v

      - name: Run tests
        working-directory: client
        run: |
          xmake build tests
          xmake run tests

      - name: Package
        working-directory: client
        run: |
          mkdir -p dist
          cp build/linux/x86_64/release/downgrade-patcher dist/downgrade-patcher-linux-x64
          cp -r resources dist/resources
          cd dist && tar czf ../downgrade-patcher-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: downgrade-patcher-linux-x64
          path: client/downgrade-patcher-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install Qt (static)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          modules: 'qtnetworkauth'
          cache: true
          # TODO: static Qt builds are not available via install-qt-action
          # For now, use dynamic and bundle with windeployqt

      - name: Configure (release + LTO)
        working-directory: client
        run: |
          xmake f -m release --toolchain=clang -y

      - name: Build
        working-directory: client
        run: xmake -v

      - name: Run tests
        working-directory: client
        run: |
          xmake build tests
          xmake run tests

      - name: Package
        working-directory: client
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item build\windows\x64\release\downgrade-patcher.exe dist\
          Copy-Item -Recurse resources dist\resources
          # Bundle only required Qt DLLs (minimal set)
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" dist\downgrade-patcher.exe `
            --no-translations --no-opengl-sw --no-system-d3d-compiler `
            --no-system-dxc-compiler --no-compiler-runtime `
            --exclude-plugins qgif,qico,qjpeg,qsvg,qtga,qtiff,qwbmp,qwebp `
            --exclude-plugins qcertonlybackend,qopensslbackend `
            --exclude-plugins qwindowsvistastyle

      - name: Remove unnecessary bundled files
        working-directory: client/dist
        shell: pwsh
        run: |
          # Remove icon engines, image formats we don't use, network backends
          Remove-Item -Recurse -Force iconengines -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force imageformats -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force networkinformation -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force tls -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force generic -ErrorAction SilentlyContinue
          Remove-Item -Force D3Dcompiler_*.dll -ErrorAction SilentlyContinue
          Remove-Item -Force opengl32sw.dll -ErrorAction SilentlyContinue
          Remove-Item -Force vc_redist*.exe -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: downgrade-patcher-windows-x64
          path: client/dist/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: downgrade-patcher-linux-x64
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: downgrade-patcher-windows-x64
          path: artifacts/windows/

      - name: Package Windows
        run: cd artifacts/windows && zip -r ../downgrade-patcher-windows-x64.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/downgrade-patcher-linux-x64.tar.gz
            artifacts/downgrade-patcher-windows-x64.zip
          generate_release_notes: true
